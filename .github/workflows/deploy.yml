name: Deploy to GitHub Pages

# Releases the site to GitHub Pages. Runs only when index.html changes
# on the main branch (i.e. when a change is merged in), plus a manual trigger.
on:
  push:
    branches: [main]
    paths:
      - index.html
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; a newer push cancels an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Uploads the repo as the Pages artifact. Only committed files are
      # included, so anything in .gitignore (strategy docs, .gstack/) is
      # never published.
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
